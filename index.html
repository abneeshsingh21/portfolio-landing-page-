<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Abneesh Singh — Agentic AI & Product Engineer</title>
    <meta name="description" content="Abneesh Singh is an Agentic AI & Product Engineer specialising in compiler design, multi-LLM orchestration, and zero-trace offline systems. Creator of EPL, NeuroShell, GHOST, IRA, and LangShift." />
    <meta name="author" content="Abneesh Singh" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://abneeshsingh.dev" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://abneeshsingh.dev" />
    <meta property="og:title" content="Abneesh Singh — Agentic AI & Product Engineer" />
    <meta property="og:description" content="Architect of AI-native programming languages, intelligent terminals, and autonomous security systems." />
    <meta property="og:image" content="https://abneeshsingh.dev/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Abneesh Singh — Agentic AI & Product Engineer" />
    <meta name="twitter:description" content="Architect of AI-native programming languages, intelligent terminals, and autonomous security systems." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!-- Font: preload for highest priority, prevents FOUT -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preload the font stylesheet itself so it blocks rendering until Inter is ready -->
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900&display=block"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900&display=block"
        rel="stylesheet"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
